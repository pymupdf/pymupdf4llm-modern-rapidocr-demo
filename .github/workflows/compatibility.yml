name: Compatibility matrix

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  parse-samples:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade uv==0.11.24

      - name: Show environment
        run: |
          python --version
          python -c "import platform, sys; print(sys.executable); print(platform.platform())"
          uv --version

      - name: Run compatibility verification
        env:
          CI_MATRIX_OS: ${{ matrix.os }}
          CI_MATRIX_PYTHON: ${{ matrix.python-version }}
        run: |
          uv run --frozen --python "${{ matrix.python-version }}" \
            python scripts/ci_compat_check.py --output-dir ci-output --ocr-dpi 150

      - name: Upload compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: compatibility-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ci-output/**
          if-no-files-found: warn
          retention-days: 14
